name: Test

# Run this job on all pushes and pull requests.
# This fork cannot publish to npm (the iobroker.viessmannapi package name
# is owned by the upstream author), so there is no release/deploy job.
on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch: {}

# Cancel previous PR/branch runs when a new commit is pushed
concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Performs quick checks before the expensive test runs
  check-and-lint:
    if: ${{ !contains(github.event.head_commit.message || '', '[skip ci]') }}

    runs-on: ubuntu-latest

    steps:
      - uses: ioBroker/testing-action-check@v2
        with:
          node-version: '24.x'
          # Uncomment the following line if your adapter cannot be installed using 'npm ci'
          # install-command: 'npm install'
          lint: true


  # Audits the full dependency tree so dependency security issues are visible in CI
  dependency-audit:
    if: ${{ !contains(github.event.head_commit.message || '', '[skip ci]') }}

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: npm
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=moderate

  # Runs adapter tests on all supported node versions and OSes
  adapter-tests:
    if: ${{ !contains(github.event.head_commit.message || '', '[skip ci]') }}

    needs: [check-and-lint, dependency-audit]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x]
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: ioBroker/testing-action-adapter@v1
        with:
          node-version: ${{ matrix.node-version }}
          os: ${{ matrix.os }}
          # Uncomment the following line if your adapter cannot be installed using 'npm ci'
          # install-command: 'npm install'
